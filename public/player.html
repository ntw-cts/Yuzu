// ── CHAPTERS ──────────────────────────────────────────────────────────────────
let _chapters = [];        // [{ label, start, end, type }]
let _chapterTimeHandle = null;
let _skipBtnHome = null;   // original parent of the skip button
let _skipBtnTimeout = null;
let _skipBtnUserHidden = false;
let _lastSkipChapter = null;
let _tooltipObserver = null;

function fmtSecs(s) {
  s = Math.round(s);
  const m = Math.floor(s / 60), sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function clearChapters() {
  _chapters = [];
  const container = plyr && plyr.elements && plyr.elements.container;
  if (container) container.classList.remove('plyr-has-chapters');

  const btn = document.getElementById('skipBtn');
  if (btn) {
    btn.classList.remove('show', 'outro-skip');
  }
  _lastSkipChapter = null;
  _skipBtnUserHidden = false;

  // Clear seekbar segments container
  const seekbarContainer = document.querySelector('.plyr-chapters-container');
  if (seekbarContainer) seekbarContainer.remove();

  if (_tooltipObserver) { _tooltipObserver.disconnect(); _tooltipObserver = null; }
  if (_skipBtnTimeout) { clearTimeout(_skipBtnTimeout); _skipBtnTimeout = null; }
  if (_chapterTimeHandle) { clearInterval(_chapterTimeHandle); _chapterTimeHandle = null; }
}

function showSkipBtnTemporarily() {
  if (!_chapters.length) return;
  const video = document.getElementById('videoEl');
  if (!video || video.paused) return;
  const t = video.currentTime;
  const ch = _chapters.find(c => t >= c.start && t < c.end);
  const isSkipCh = ch && (ch.type === 'intro' || ch.type === 'outro');

  if (isSkipCh) {
    _skipBtnUserHidden = false;
    const skipBtn = document.getElementById('skipBtn');
    const skipLabel = document.getElementById('skipBtnLabel');
    if (skipBtn && !skipBtn.classList.contains('show')) {
      skipBtn.classList.add('show');
      skipBtn.classList.toggle('outro-skip', ch.type === 'outro');
      if (skipLabel) skipLabel.textContent = ch.type === 'intro' ? 'Skip Intro' : 'Skip Outro';
    }
    resetSkipBtnTimeout();
  }
}

function resetSkipBtnTimeout() {
  if (_skipBtnTimeout) clearTimeout(_skipBtnTimeout);
  _skipBtnTimeout = setTimeout(() => {
    _skipBtnUserHidden = true;
    const skipBtn = document.getElementById('skipBtn');
    if (skipBtn) {
      skipBtn.classList.remove('show', 'outro-skip');
    }
  }, 5000);
}

// Global user interaction listeners to reveal skip button
document.addEventListener('mousemove', showSkipBtnTemporarily);
document.addEventListener('touchstart', showSkipBtnTemporarily);

// Chapter progress and buffer tracking event handlers
function updateProgressChaptersFill() {
  const video = document.getElementById('videoEl');
  if (!video || !video.duration || !_chapters.length) return;

  const t = video.currentTime;
  const segments = document.querySelectorAll('.plyr-chapter-segment');
  
  _chapters.forEach((ch, idx) => {
    const seg = segments[idx];
    if (!seg) return;

    const fill = seg.querySelector('.plyr-chapter-fill');
    if (!fill) return;

    if (t < ch.start) {
      fill.style.width = '0%';
    } else if (t > ch.end) {
      fill.style.width = '100%';
    } else {
      const pct = ((t - ch.start) / (ch.end - ch.start)) * 100;
      fill.style.width = pct + '%';
    }
  });
}

function updateProgressChaptersBuffer() {
  const video = document.getElementById('videoEl');
  if (!video || !video.duration || !_chapters.length) return;

  const buffered = video.buffered;
  const segments = document.querySelectorAll('.plyr-chapter-segment');
  
  _chapters.forEach((ch, idx) => {
    const seg = segments[idx];
    if (!seg) return;

    const buffer = seg.querySelector('.plyr-chapter-buffer');
    if (!buffer) return;

    let totalIntersection = 0;
    for (let i = 0; i < buffered.length; i++) {
      const start = buffered.start(i);
      const end = buffered.end(i);
      
      const intersectStart = Math.max(start, ch.start);
      const intersectEnd = Math.min(end, ch.end);
      if (intersectEnd > intersectStart) {
        totalIntersection += (intersectEnd - intersectStart);
      }
    }

    const chDur = ch.end - ch.start;
    const pct = chDur > 0 ? (totalIntersection / chDur) * 100 : 0;
    buffer.style.width = pct + '%';
  });
}

const videoEl = document.getElementById('videoEl');
if (videoEl) {
  videoEl.addEventListener('timeupdate', updateProgressChaptersFill);
  videoEl.addEventListener('progress', updateProgressChaptersBuffer);
}

function rebuildProgressChapters() {
  const progressContainer = document.querySelector('.plyr__progress');
  if (!progressContainer) return;

  const container = plyr && plyr.elements && plyr.elements.container;
  if (!_chapters.length) {
    if (container) container.classList.remove('plyr-has-chapters');
    return;
  }

  const video = document.getElementById('videoEl');
  const dur = video.duration;
  if (!dur || isNaN(dur)) return;

  if (container) container.classList.add('plyr-has-chapters');

  let seekbarContainer = progressContainer.querySelector('.plyr-chapters-container');
  if (!seekbarContainer) {
    seekbarContainer = document.createElement('div');
    seekbarContainer.className = 'plyr-chapters-container';
    progressContainer.appendChild(seekbarContainer);
  } else {
    seekbarContainer.innerHTML = '';
  }

  _chapters.forEach((ch, idx) => {
    const segment = document.createElement('div');
    segment.className = 'plyr-chapter-segment';
    segment.dataset.type = ch.type;
    segment.dataset.index = idx;
    
    const pct = ((ch.end - ch.start) / dur) * 100;
    segment.style.width = pct + '%';

    const bufferFill = document.createElement('div');
    bufferFill.className = 'plyr-chapter-buffer';

    const progressFill = document.createElement('div');
    progressFill.className = 'plyr-chapter-fill';

    segment.appendChild(bufferFill);
    segment.appendChild(progressFill);
    seekbarContainer.appendChild(segment);
  });
  
  updateProgressChaptersFill();
  updateProgressChaptersBuffer();
}

function setupTooltipObserver() {
  if (_tooltipObserver) return;
  const tooltip = document.querySelector('.plyr__progress .plyr__tooltip');
  if (!tooltip) return;

  _tooltipObserver = new MutationObserver((mutations) => {
    // Avoid double processing if our styled span is already present
    if (tooltip.querySelector('.plyr-tooltip-chapter')) return;

    const txt = tooltip.textContent.trim();
    if (!txt || !_chapters.length) return;

    const parts = txt.split(':').map(Number);
    let secs = 0;
    if (parts.length === 2) {
      secs = parts[0] * 60 + parts[1];
    } else if (parts.length === 3) {
      secs = parts[0] * 3600 + parts[1] * 60 + parts[2];
    } else {
      return;
    }

    const ch = _chapters.find(c => secs >= c.start && secs < c.end);
    if (ch && ch.label) {
      _tooltipObserver.disconnect();
      tooltip.innerHTML = `${txt} <span class="plyr-tooltip-chapter">• ${ch.label}</span>`;
      _tooltipObserver.observe(tooltip, { childList: true, characterData: true, subtree: true });
    }
  });

  _tooltipObserver.observe(tooltip, { childList: true, characterData: true, subtree: true });
}

function renderChapters(intro, outro) {
  clearChapters();

  const hasIntro = intro && intro.start != null && intro.end > intro.start;
  const hasOutro = outro && outro.start != null && outro.end > outro.start;
  if (!hasIntro && !hasOutro) return;

  // Remember the skip button's original parent for fullscreen move/restore
  const skipBtn = document.getElementById('skipBtn');
  if (!_skipBtnHome) _skipBtnHome = skipBtn.parentElement;

  const video = document.getElementById('videoEl');

  const buildPills = () => {
    if (window._chapterBuilt) return;
    const dur = video.duration;
    if (!dur || isNaN(dur)) return;
    window._chapterBuilt = true;

    _chapters = [];
    if (hasIntro) {
      if (intro.start > 0) _chapters.push({ label: 'Cold Open', start: 0, end: intro.start, type: 'main' });
      _chapters.push({ label: 'Intro', start: intro.start, end: intro.end, type: 'intro' });
    }
    if (hasOutro) {
      const mainStart = hasIntro ? intro.end : 0;
      if (outro.start > mainStart) _chapters.push({ label: 'Episode', start: mainStart, end: outro.start, type: 'main' });
      _chapters.push({ label: 'Outro', start: outro.start, end: outro.end, type: 'outro' });
      if (outro.end < dur) _chapters.push({ label: 'Post-Credits', start: outro.end, end: dur, type: 'main' });
    } else if (hasIntro) {
      _chapters.push({ label: 'Episode', start: intro.end, end: dur, type: 'main' });
    }

    setupTooltipObserver();
    rebuildProgressChapters();

    startChapterTracking();
  };

  window._chapterBuilt = false;
  if (video.readyState >= 1 && video.duration) {
    buildPills();
  } else {
    video.addEventListener('loadedmetadata', buildPills, { once: true });
    video.addEventListener('durationchange', buildPills, { once: true });
  }
}

function startChapterTracking() {
  if (_chapterTimeHandle) clearInterval(_chapterTimeHandle);
  const video = document.getElementById('videoEl');
  const skipBtn = document.getElementById('skipBtn');
  const skipLabel = document.getElementById('skipBtnLabel');

  _chapterTimeHandle = setInterval(() => {
    if (!_chapters.length || !video || !video.duration) return;
    const t = video.currentTime;

    let activeIdx = -1;
    _chapters.forEach((ch, i) => { if (t >= ch.start && t < ch.end) activeIdx = i; });

    // Show / hide skip button during intro or outro
    const ch = activeIdx >= 0 ? _chapters[activeIdx] : null;
    const isSkipCh = ch && (ch.type === 'intro' || ch.type === 'outro');

    if (!video.paused && isSkipCh) {
      if (_lastSkipChapter !== ch) {
        _lastSkipChapter = ch;
        _skipBtnUserHidden = false;
        resetSkipBtnTimeout();
      }

      if (!_skipBtnUserHidden) {
        if (skipBtn) {
          skipBtn.classList.add('show');
          skipBtn.classList.toggle('outro-skip', ch.type === 'outro');
        }
        if (skipLabel) {
          skipLabel.textContent = ch.type === 'intro' ? 'Skip Intro' : 'Skip Outro';
        }
      } else {
        if (skipBtn) skipBtn.classList.remove('show', 'outro-skip');
      }
    } else {
      _lastSkipChapter = null;
      _skipBtnUserHidden = false;
      if (skipBtn) skipBtn.classList.remove('show', 'outro-skip');
      if (_skipBtnTimeout) { clearTimeout(_skipBtnTimeout); _skipBtnTimeout = null; }
    }
  }, 500);
}

function skipChapter() {
  const video = document.getElementById('videoEl');
  const t = video.currentTime;
  const ch = _chapters.find(c => t >= c.start && t < c.end);
  if (ch) {
    video.currentTime = ch.end;
    if (plyr) plyr.play().catch(() => {});
  }
}

function hideMouseCursor() {
  document.documentElement.classList.add('hide-cursor');
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
  if (fsEl) fsEl.classList.add('hide-cursor');
}
function showMouseCursor() {
  document.documentElement.classList.remove('hide-cursor');
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
  if (fsEl) fsEl.classList.remove('hide-cursor');
}

// Move the skip button into the fullscreen element and manage cursor visibility across browser engines
['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'].forEach(evt => {
  document.addEventListener(evt, () => {
    const skipBtn = document.getElementById('skipBtn');
    const fsEl = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
    if (fsEl) {
      // Entering fullscreen — reparent skip button into the fullscreen container
      if (skipBtn) fsEl.appendChild(skipBtn);
    } else {
      // Exiting fullscreen — move it back home
      if (skipBtn && _skipBtnHome) _skipBtnHome.appendChild(skipBtn);
      
      // Restore cursor
      showMouseCursor();
    }
  });
});

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type='warn', dur=4000) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span>${{err:'✕',ok:'✓',warn:'⚠'}[type]||'●'}</span><span>${esc(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

// ── AUTO-LOAD FROM URL PARAMS ─────────────────────────────────────────────────
(async function init() {
  const params  = new URLSearchParams(window.location.search);
  let   session = params.get('session');
  const title   = params.get('title') || 'Unknown Anime';
  const epParam = params.get('episode') || params.get('ep');
  const epImgParam = params.get('ep_img') || params.get('episode_image') || '';
  let   poster  = params.get('poster') || '';

  if (!session) return;

  // Resolve AnimePahe session (UUID) to Worker slug if needed
  if (session.includes('-') && session.length === 36) {
    try {
      const searchRes = await fetch(`${API}/api/search?q=` + encodeURIComponent(title));
      const searchJson = await searchRes.json();
      const results = (searchJson.success && searchJson.data && searchJson.data.results) || [];
      if (results.length) {
        session = results[0].slug;
      }
    } catch (_) {}
  }
  if (!poster) {
    try {
      const res = await fetch(`${API}/api/info?slug=` + encodeURIComponent(session));
      const json = await res.json();
      if (json.success && json.data) {
        const d = json.data;
        poster = (d.coverImage && (d.coverImage.large || d.coverImage.medium)) || '';
      }
    } catch (_) {}
  }

  await selectAnime({ session, title, poster, snapshot: '' });

  const eps = window._loadedEpisodes || [];
  if (!eps.length) return;

  let target = null;
  if (epParam) {
    target = eps.find(e => String(e.number) === epParam);
    if (!target) {
      target = { number: Number(epParam), title: 'Episode ' + epParam, img: epImgParam };
      eps.push(target);
      renderEpisodes(eps);
    } else if (epImgParam && !target.img) {
      target.img = epImgParam;
      renderEpisodes(eps);
    }
  }

  playEpisode(target || eps[0]);
})();

// ── MOBILE HAMBURGER MENU ─────────────────────────────────────────────────────
(function() {
  const btn      = document.getElementById('mobMenuBtn');
  const drawer   = document.getElementById('mobDrawer');
  const backdrop = document.getElementById('mobDrawerBackdrop');
  if (!btn || !drawer || !backdrop) return;

  function applyVisibility() {
    btn.style.display = window.innerWidth <= 480 ? 'flex' : 'none';
    if (window.innerWidth > 480) closeDrawer();
  }
  applyVisibility();
  window.addEventListener('resize', applyVisibility);

  function openDrawer()  { drawer.classList.add('open'); backdrop.classList.add('open'); btn.classList.add('open'); btn.setAttribute('aria-label','Close menu'); }
  function closeDrawer() { drawer.classList.remove('open'); backdrop.classList.remove('open'); btn.classList.remove('open'); btn.setAttribute('aria-label','Open menu'); }
  btn.addEventListener('click', () => drawer.classList.contains('open') ? closeDrawer() : openDrawer());
  backdrop.addEventListener('click', closeDrawer);
  drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', closeDrawer));

  const topDot  = document.getElementById('statusDot');
  const topText = document.getElementById('statusText');
  const mobDot  = document.getElementById('mobStatusDot');
  const mobTxt  = document.getElementById('mobStatusText');
  if (topDot && mobDot) {
    const obs = new MutationObserver(() => {
      mobDot.className = topDot.className;
      if (mobTxt && topText) mobTxt.textContent = topText.textContent;
    });
    obs.observe(topDot, { attributes: true, attributeFilter: ['class'] });
    if (topText) obs.observe(topText, { childList: true, characterData: true, subtree: true });
  }

  // Load Stress Test Panel if query parameter `stress` is active
  if (new URLSearchParams(window.location.search).has('stress')) {
    const script = document.createElement('script');
    script.src = '/stress-test.js';
    document.body.appendChild(script);
  }
})();
